stages:
  - build
  - test
  - deploy

variables:
  NODE_VERSION: "18"
  NODE_ENV: "production"

# ============ BUILD STAGE ============

build:frontend:
  stage: build
  image: node:${NODE_VERSION}
  cache:
    paths:
      - node_modules/
    key: frontend-$CI_COMMIT_REF_SLUG
  script:
    - echo "Installing frontend dependencies..."
    - npm ci
    - echo "Building frontend..."
    - npm run build
    - echo "Frontend build completed successfully!"
  artifacts:
    paths:
      - dist/
    expire_in: 30 days
  only:
    - main
    - develop
    - merge_requests

build:backend:
  stage: build
  image: node:${NODE_VERSION}
  cache:
    paths:
      - backend/node_modules/
    key: backend-$CI_COMMIT_REF_SLUG
  script:
    - echo "Installing backend dependencies..."
    - cd backend
    - npm ci
    - echo "Backend dependencies installed successfully!"
  artifacts:
    paths:
      - backend/node_modules/
      - backend/
    expire_in: 30 days
  only:
    - main
    - develop
    - merge_requests

# ============ TEST STAGE ============

test:frontend:
  stage: test
  image: node:${NODE_VERSION}
  cache:
    paths:
      - node_modules/
    key: frontend-$CI_COMMIT_REF_SLUG
  script:
    - npm ci
    - echo "Running frontend tests..."
    - npm run test 2>/dev/null || echo "No test script configured"
  allow_failure: true
  only:
    - main
    - develop
    - merge_requests

test:backend:
  stage: test
  image: node:${NODE_VERSION}
  cache:
    paths:
      - backend/node_modules/
    key: backend-$CI_COMMIT_REF_SLUG
  script:
    - cd backend
    - npm ci
    - echo "Running backend tests..."
    - npm run test 2>/dev/null || echo "No test script configured"
  allow_failure: true
  only:
    - main
    - develop
    - merge_requests

# ============ DEPLOY STAGE ============

deploy:staging:
  stage: deploy
  image: node:${NODE_VERSION}
  before_script:
    - apt-get update && apt-get install -y openssh-client rsync
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $STAGING_SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - echo "Deploying to staging environment..."
    - echo "Building frontend..."
    - npm ci
    - npm run build
    - echo "Preparing backend..."
    - cd backend && npm ci && cd ..
    - echo "Uploading to staging server..."
    - ssh $DEPLOY_USER@$STAGING_SERVER_IP "mkdir -p /app/staging"
    - rsync -avz --delete --exclude=node_modules --exclude=.git ./dist/ $DEPLOY_USER@$STAGING_SERVER_IP:/app/staging/dist/
    - rsync -avz --delete --exclude=node_modules --exclude=.git ./backend/ $DEPLOY_USER@$STAGING_SERVER_IP:/app/staging/backend/
    - echo "Starting staging services..."
    - |
      ssh $DEPLOY_USER@$STAGING_SERVER_IP << 'EOF'
        cd /app/staging/backend
        npm install --production
        pm2 restart attendance-backend || pm2 start server.js --name attendance-backend
        pm2 save
      EOF
    - echo "Staging deployment completed!"
  environment:
    name: staging
    url: https://staging.yourdomain.com
  only:
    - develop
  when: manual
  tags:
    - deployment

deploy:production:
  stage: deploy
  image: node:${NODE_VERSION}
  before_script:
    - apt-get update && apt-get install -y openssh-client rsync
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $PRODUCTION_SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - echo "🚀 Deploying to PRODUCTION..."
    - echo "Building frontend for production..."
    - npm ci
    - npm run build
    - echo "Preparing backend..."
    - cd backend && npm ci && cd ..
    - echo "📤 Uploading to production server..."
    - ssh $DEPLOY_USER@$PRODUCTION_SERVER_IP "mkdir -p /app/production"
    - rsync -avz --delete --exclude=node_modules --exclude=.git ./dist/ $DEPLOY_USER@$PRODUCTION_SERVER_IP:/app/production/dist/
    - rsync -avz --delete --exclude=node_modules --exclude=.git ./backend/ $DEPLOY_USER@$PRODUCTION_SERVER_IP:/app/production/backend/
    - echo "🔄 Restarting production services..."
    - |
      ssh $DEPLOY_USER@$PRODUCTION_SERVER_IP << 'EOF'
        cd /app/production/backend
        npm install --production
        pm2 restart attendance-backend || pm2 start server.js --name attendance-backend
        pm2 save
      EOF
    - echo "✅ Production deployment completed!"
  environment:
    name: production
    url: https://yourdomain.com
    deployment_tier: production
  only:
    - main
  when: manual
  tags:
    - deployment
